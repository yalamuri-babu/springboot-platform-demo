{{- if .Values.blueGreen.enabled }}
{{- range $colorName, $colorConfig := .Values.colors }}
{{- if $colorConfig.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "springboot-app.fullname" $ }}-{{ $colorName }}
  labels:
    {{- include "springboot-app.selectorLabels" $ | nindent 4 }}
    version-color: {{ $colorName }}
spec:
  replicas: {{ $colorConfig.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "springboot-app.name" $ }}
      app.kubernetes.io/instance: {{ $.Release.Name }}
      version-color: {{ $colorName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "springboot-app.name" $ }}
        app.kubernetes.io/instance: {{ $.Release.Name }}
        version-color: {{ $colorName }}
    spec:
      containers:
        - name: {{ include "springboot-app.name" $ }}
          image: "{{ $.Values.image.repository }}:{{ $colorConfig.imageTag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 15
---
{{- end }}
{{- end }}
{{- else }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "springboot-app.fullname" . }}
  labels:
    {{- include "springboot-app.selectorLabels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "springboot-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "springboot-app.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ include "springboot-app.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
{{- end }}