replicaCount: 1

image:
  tag: "staging-latest"

service:
  type: ClusterIP

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  averageUtilization: 70

pdb:
  enabled: true
  minAvailable: 1