replicaCount: 1

image:
  repository: 776751404462.dkr.ecr.ap-south-1.amazonaws.com/springboot-devops-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

containerPort: 8080

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "250m"
    memory: "512Mi"

readinessProbe:
  path: /
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  path: /
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  averageUtilization: 70

pdb:
  enabled: false
  minAvailable: 1

ingress:
  enabled: false
  className: ""
  host: ""
  path: /
  pathType: Prefix